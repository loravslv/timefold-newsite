          gsap.set(logo, { clearProps: 'all' });
          gsap.set([lineTop, lineMid, lineBot], { rotation: 0, y: 0, autoAlpha: 1 });
          panels.forEach((p) => {
            gsap.set(p, { clearProps: 'all' });
            gsap.set(getFade(p), { clearProps: 'all' });
          });
          burger.setAttribute('aria-expanded', 'false');
          state.mobileMenuOpen = false;
          state.mobilePanelActive = null;
          document.body.style.overflow = '';
          resetDesktop();
        }
        if (!was && state.isMobile) {
          killDropdown();
          state.isOpen = false;
          state.activePanel = null;
          state.activePanelIndex = -1;
          clearTimers();
          menuWrap.setAttribute('data-menu-open', 'false');
          resetToggles();
          setupMobile();
        }
      }, 150);
    }
    // EVENT BINDING
    toggles.forEach((btn) => {
      btn.addEventListener('mouseenter', handleToggleEnter);
      btn.addEventListener('mouseleave', handleToggleLeave);
      btn.addEventListener('keydown', handleKeydownOnToggle);
      btn.addEventListener('click', handleToggleClick);
    });
    dropWrapper.addEventListener('mouseenter', handleWrapperEnter);
    dropWrapper.addEventListener('mouseleave', handleWrapperLeave);
    panels.forEach((p) => p.addEventListener('keydown', handleKeydownInPanel));
    backdrop.addEventListener('click', closeDropdown);
    document.addEventListener('keydown', handleEscape);
    document.addEventListener('click', handleDocClick);
    burger.addEventListener('click', () => (state.mobileMenuOpen ? closeMobileMenu() : openMobileMenu()));
    backBtn.addEventListener('click', closeMobilePanel);
    window.addEventListener('resize', handleResize);
    window.addEventListener('load', updateNavHeight);
    // INIT
    updateNavHeight();
    state.isMobile ? setupMobile() : resetDesktop();
  }
  //Scramble link text
  function initScrambleOnHover() {
    let targets = document.querySelectorAll('[data-scramble-hover="link"]');
    targets.forEach((target) => {
      let textEl = target.querySelector('[data-scramble-hover="target"]');
      let originalText = textEl.textContent;
      let customHoverText = textEl.getAttribute('data-scramble-text');
      let customChars = textEl.getAttribute('data-scramble-chars');
      let split = new SplitText(textEl, {
        type: 'words, chars',
        wordsClass: 'word',
        charsClass: 'char',
      });
      target.addEventListener('mouseenter', () => {
        gsap.to(textEl, {
          duration: 0.5,
          scrambleText: {
            text: customHoverText ? customHoverText : originalText,
            chars: customChars ? customChars : 'TIMEFOLD',
          },
        });
      });
    });
  }
  //Lazyload footer form
  function initHubSpotFooterForm() {
    const formTarget = document.getElementById('hbspt-form-target');
    if (!formTarget) return;
    const observer = new IntersectionObserver(
      (entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            observer.disconnect();
            const script = document.createElement('script');
            script.src = '//js-eu1.hsforms.net/forms/embed/v2.js';
            script.charset = 'utf-8';
            script.onload = () => {
              hbspt.forms.create({
                portalId: '26709368',
                formId: '7646fa2d-e0fe-47fa-8dba-733d4de063e6',
                region: 'eu1',
                target: '#hbspt-form-target',
              });
            };
            document.head.appendChild(script);
          }
        });
      },
      { rootMargin: '200px' },
    );
    observer.observe(formTarget);
  }
  // Set Footer Copyright Year
  Webflow.push(function () {
    $('.copyright-year').text(new Date().getFullYear());
  });
</script>
  <script>
  document.addEventListener('DOMContentLoaded', function () {
    var dropWrapper = document.querySelector('[data-dropdown-wrapper]');
    var inners = document.querySelectorAll('.mega-nav__dropdown-inner');
    var toggles = document.querySelectorAll('[data-dropdown-toggle]');
    inners.forEach(function (inner) {
      inner.addEventListener('mouseleave', function (e) {
        var to = e.relatedTarget;
        // Stay open if moving to another inner element
        var insideAnyInner = false;
        inners.forEach(function (other) {
          if (other.contains(to)) insideAnyInner = true;
        });
        if (insideAnyInner) return;
        // Stay open if moving to a nav toggle (it will re-open the correct panel)
        var isToggle = false;
        toggles.forEach(function (t) {
          if (t === to || t.contains(to)) isToggle = true;
        });
        if (isToggle) return;
        // Otherwise close
        dropWrapper.dispatchEvent(
          new MouseEvent('mouseleave', {
            bubbles: false,
            cancelable: true,
            relatedTarget: to || document.body,
          }),
        );
      });
    });
  });
</script>
